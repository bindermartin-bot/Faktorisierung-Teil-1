<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernprogramm: Faktorisierung von Termen</title>
    <!-- MathJax for rendering LaTeX -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --task-bg: #eef2ff;
            --task-border: #c7d2fe;
            --solution-bg: #f0fdf4;
            --solution-border: #bbf7d0;
            --btn-hover: #004494;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            height: 6px;
        }

        .progress-bar {
            height: 100%;
            background-color: #ff9800;
            width: 0%;
            transition: width 0.4s ease;
        }

        .content-area {
            padding: 30px;
        }

        .step-title {
            color: var(--primary-color);
            font-size: 20px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .explanation {
            font-size: 16px;
            margin-bottom: 25px;
        }

        .task-box {
            background-color: var(--task-bg);
            border-left: 5px solid #4f46e5;
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .task-label {
            font-weight: bold;
            color: #4338ca;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
        }

        .solution-box {
            background-color: var(--solution-bg);
            border-left: 5px solid #22c55e;
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 25px;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .solution-label {
            font-weight: bold;
            color: #15803d;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #btn-next {
            display: none;
            background-color: #ff9800;
            color: #fff;
        }

        #btn-next:hover {
            background-color: #e68a00;
        }

        .step-counter {
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }

        .math-block {
            margin: 15px 0;
            font-size: 110%;
        }

        /* Confetti effect for the end */
        .completed-message {
            text-align: center;
            display: none;
            padding: 40px 20px;
        }

        .completed-message h2 {
            color: #22c55e;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <header>
        <h1>Faktorisierung von Termen</h1>
        <div style="font-size: 14px; opacity: 0.8; margin-top: 5px;">Interaktives Lernprogramm (nach F. W. Buckel)</div>
    </header>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="content-area" id="learning-area">
        <h2 class="step-title" id="step-title">Lade Schritt...</h2>
        
        <div class="explanation" id="explanation"></div>
        
        <div class="task-box" id="task-box">
            <span class="task-label">Aufgabe</span>
            <div id="task-content"></div>
        </div>

        <div class="solution-box" id="solution-box">
            <span class="solution-label">Lösung</span>
            <div id="solution-content"></div>
        </div>

        <div class="controls">
            <span class="step-counter" id="step-counter">Schritt 1 / X</span>
            <div class="button-group">
                <button id="btn-solution" onclick="showSolution()">Lösung anzeigen</button>
                <button id="btn-next" onclick="nextStep()">Nächster Schritt &rarr;</button>
            </div>
        </div>
    </div>

    <div class="completed-message" id="completed-message">
        <h2>🎉 Glückwunsch!</h2>
        <p>Du hast das Lernprogramm erfolgreich durchgearbeitet.</p>
        <button onclick="restartProgram()" style="margin-top: 20px; background-color: #4f46e5;">Programm neustarten</button>
    </div>
</div>

<script>
    // Die Lernschritte basierend auf dem PDF-Dokument
    const steps = [
        {
            title: "Schritt 1: Lineare Gleichungen & Lösungsterme",
            content: "Wir beginnen mit einer sehr wichtigen Grundlage:<br><br>Die Gleichung \( x - 3 = 0 \) hat die Lösung \( x = 3 \).<br>Umgekehrt ist \( x = 3 \) die Lösung der Gleichung \( (x - 3) = 0 \).<br><br>Die Gleichung \( x + 2 = 0 \) hat die Lösung \( x = -2 \).<br>Umgekehrt ist \( x = -2 \) die Lösung der Gleichung \( (x + 2) = 0 \).<br><br><strong>Wichtig:</strong> So gehören Gleichungen des Typs \( (x - a) = 0 \) und die Lösung \( x = a \) zusammen. Beachte den Vorzeichenwechsel beim Übergang von Gleichung zur Lösungszahl!",
            task: "Welcher Gleichungsterm gehört zur Lösung \( x = \frac{1}{2} \) und welcher zu \( x = -\frac{2}{3} \)?",
            solution: "Zur Lösung \( x = \frac{1}{2} \) gehört der Gleichungsterm \( (x - \frac{1}{2}) = 0 \).<br><br>Zur Lösung \( x = -\frac{2}{3} \) gehört der Gleichungsterm \( (x + \frac{2}{3}) = 0 \)."
        },
        {
            title: "Schritt 2: Das Produkt der Lösungsterme",
            content: "Gegeben ist die quadratische Gleichung \( x^2 + 3x - 10 = 0 \).<br><br>Mit der Lösungsformel (Mitternachtsformel) erhält man:<br>\( x_{1,2} = \frac{-3 \pm \sqrt{9 - 4 \cdot 1 \cdot (-10)}}{2} = \frac{-3 \pm 7}{2} \)<br><br>Das ergibt die Lösungen \( x_1 = 2 \) und \( x_2 = -5 \).<br>Zu diesen Lösungen gehören die Terme \( (x - 2) = 0 \) und \( (x + 5) = 0 \).",
            task: "Wenn man diese beiden Lösungsterme multipliziert, entsteht das Produkt \( (x - 2)(x + 5) \).<br>Berechne dieses Produkt. Was fällt dir auf?",
            solution: "Wir multiplizieren aus:<br>\( (x - 2)(x + 5) = x^2 + 5x - 2x - 10 = \mathbf{x^2 + 3x - 10} \)<br><br><strong>Erkenntnis:</strong> Multipliziert man die beiden Lösungsterme, erhält man genau die ursprüngliche quadratische Gleichung zurück! Das nennt man <em>Faktorisieren</em>."
        },
        {
            title: "Schritt 3: Faktorisierung anwenden",
            content: "Mit dieser Methode können wir quadratische Terme in ein Produkt zerlegen (faktorisieren):<br><br>1. Schritt: Setze den Term gleich null und berechne die Lösungen \( x_1 \) und \( x_2 \).<br>2. Schritt: Bilde das Produkt der Lösungsterme \( (x - x_1)(x - x_2) \).",
            task: "Faktorisiere mit dieser Methode den Term \( x^2 + 10x + 21 \).",
            solution: "<strong>1. Schritt:</strong> Lösung der Gleichung \( x^2 + 10x + 21 = 0 \).<br>\( x_{1,2} = \frac{-10 \pm \sqrt{100 - 84}}{2} = \frac{-10 \pm 4}{2} \)<br>Das liefert \( x_1 = -3 \) und \( x_2 = -7 \).<br><br><strong>2. Schritt:</strong> Die Lösungsterme sind \( (x + 3) \) und \( (x + 7) \).<br><br><strong>Ergebnis:</strong> \( x^2 + 10x + 21 = (x + 3)(x + 7) \)"
        },
        {
            title: "Schritt 4: Terme mit Faktor vor x²",
            content: "Wenn vor dem \( x^2 \) eine Zahl steht (z.B. ein \( a \ne 1 \)), muss diese zwingend als Faktor beibehalten werden!<br><br>Allgemein gilt: \( \mathbf{a}x^2 + bx + c = \mathbf{a} \cdot (x - x_1)(x - x_2) \)",
            task: "Faktorisiere den Term \( 4x^2 - 24x + 36 \).<br><em>Hinweis: Löse zuerst \( 4x^2 - 24x + 36 = 0 \). Du kannst die Gleichung vor dem Lösen durch 4 teilen. Vergiss aber am Ende die 4 bei der Faktorisierung nicht!</em>",
            solution: "Gleichung durch 4 geteilt: \( x^2 - 6x + 9 = 0 \).<br>Dies liefert eine doppelte Lösung: \( x_{1,2} = 3 \).<br>Die Lösungsterme sind also \( (x - 3) \) und \( (x - 3) \).<br><br><strong>Ergebnis mit Faktor 4:</strong><br>\( 4x^2 - 24x + 36 = \mathbf{4} \cdot (x - 3)^2 \)"
        },
        {
            title: "Schritt 5: Terme 3. Grades (x ausklammern)",
            content: "Es gibt Terme 3. Grades, die man sofort lösen kann, weil sie ein besonderes Merkmal haben: Jeder Summand enthält \( x \). In diesem Fall gibt es kein Absolutglied.<br><br>Gegeben ist die Gleichung: \( x^3 - 8x^2 - 9x = 0 \).<br>Wir klammern \( x \) aus: \( x \cdot (x^2 - 8x - 9) = 0 \).<br><br>Ein Produkt wird null, wenn einer der Faktoren null ist. Also ist die erste Lösung sofort: \( \mathbf{x_1 = 0} \).",
            task: "Der zweite Faktor ist \( x^2 - 8x - 9 = 0 \).<br>Bestimme die weiteren Lösungen und notiere die vollständige Faktorisierung des Terms \( x^3 - 8x^2 - 9x \).",
            solution: "Wir lösen: \( x^2 - 8x - 9 = 0 \).<br>\( x_{2,3} = \frac{8 \pm \sqrt{64 + 36}}{2} = \frac{8 \pm 10}{2} \)<br>Das liefert \( x_2 = 9 \) und \( x_3 = -1 \).<br><br>Damit haben wir drei Faktoren.<br><strong>Ergebnis:</strong> \( x^3 - 8x^2 - 9x = x \cdot (x - 9)(x + 1) \)"
        }
    ];

    let currentStep = 0;

    function renderStep() {
        const step = steps[currentStep];
        
        document.getElementById('step-title').innerHTML = step.title;
        document.getElementById('explanation').innerHTML = step.content;
        document.getElementById('task-content').innerHTML = step.task;
        document.getElementById('solution-content').innerHTML = step.solution;
        
        document.getElementById('step-counter').innerText = `Schritt ${currentStep + 1} von ${steps.length}`;
        
        // Progress bar
        const progress = ((currentStep) / steps.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        // Reset UI state
        const solBox = document.getElementById('solution-box');
        solBox.style.display = 'none';
        solBox.style.opacity = '0';
        
        document.getElementById('btn-solution').style.display = 'inline-block';
        document.getElementById('btn-next').style.display = 'none';

        // Trigger MathJax rendering
        if (window.MathJax) {
            MathJax.typesetPromise([document.getElementById('learning-area')]).catch(function (err) {
                console.log('MathJax error: ', err.message);
            });
        }
    }

    function showSolution() {
        const solBox = document.getElementById('solution-box');
        solBox.style.display = 'block';
        
        // Small delay for transition
        setTimeout(() => {
            solBox.style.opacity = '1';
        }, 10);

        document.getElementById('btn-solution').style.display = 'none';
        
        const btnNext = document.getElementById('btn-next');
        btnNext.style.display = 'inline-block';
        
        if (currentStep === steps.length - 1) {
            btnNext.innerText = "Programm abschließen";
        } else {
            btnNext.innerHTML = "Nächster Schritt &rarr;";
        }
    }

    function nextStep() {
        if (currentStep < steps.length - 1) {
            currentStep++;
            renderStep();
        } else {
            finishProgram();
        }
    }

    function finishProgram() {
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('learning-area').style.display = 'none';
        document.getElementById('completed-message').style.display = 'block';
    }

    function restartProgram() {
        currentStep = 0;
        document.getElementById('learning-area').style.display = 'block';
        document.getElementById('completed-message').style.display = 'none';
        renderStep();
    }

    // Initial render
    window.onload = renderStep;
</script>
</body>
</html>
